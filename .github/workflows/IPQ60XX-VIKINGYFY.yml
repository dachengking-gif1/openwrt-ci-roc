name: IPQ60XX-VIKINGYFY

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/VIKINGYFY/immortalwrt.git
      repo_branch: main
      config_file: configs/IPQ60XX.config
      firmware_tag: IPQ60XX-VIKINGYFY
      kernel_file: kernel-6.18
      artifact_prefix: IPQ60XX-VIKINGYFY
      manifest_file: immortalwrt-qualcommax-ipq60xx.manifest
      diy_script: scripts/Roc-script-618.sh
      release_summary: >-
        这是开启全功能NSS的6.18内核固件（基于VIKINGYFY/immortalwrt），默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、upnp、wol、samba4、vlmcsd、autoreboot、uhttpd、frps、frpc、diskman、hd-idle、acme、wireguard、watchcat、3cat、passwall2、openclash、docker，并添加了若干工具，具体详见IPQ60XX.config和General.config。
